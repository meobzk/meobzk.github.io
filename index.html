
<!DOCTYPE html><html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{font-family:Arial;background:#eef2f5;max-width:760px;margin:auto;padding:16px}
.card{background:#fff;padding:16px;border-radius:12px;margin:12px 0}
.row{display:flex;gap:8px;align-items:flex-start;margin:10px 0}.grow{flex:1}
input,textarea{width:100%;box-sizing:border-box;padding:10px;border:1px solid #ccc;border-radius:8px}
button{background:#1677ff;color:#fff;border:0;border-radius:8px;padding:10px 14px}
.used{color:green;font-weight:bold}.linkbox{border:1px solid #ddd;border-radius:10px;padding:10px;margin:10px 0}
</style></head><body>
<div class="card"><h2>Android Setup Hub</h2><div id="cnt"></div><div id="emails"></div></div>

<div class="card"><h3>📥 Cập nhật mail</h3>
<textarea id="bulk" rows="6" placeholder="email@abc.us|password"></textarea><br><br>
<button onclick="updateMail()">Cập nhật Mail</button>
<button onclick="resetUsed()">Reset</button>
</div>

<div class="card"><h3>🔑 Password chung</h3>
<input id="pwd" placeholder="Nhập password chung">
<br><br>
<button onclick="copyPwd()">📋 Copy Password</button>
</div>

<div class="card"><details><summary><b>🔗 8 Link nhanh</b></summary><div id="links"></div></details></div>

<div class="card"><h3>📝 Ghi chú</h3><textarea id="note" rows="5"></textarea></div>

<script>
let mails=JSON.parse(localStorage.mails||"[]"),used=JSON.parse(localStorage.used||"[]");
while(mails.length<10)mails.push("");while(used.length<10)used.push(false);
let links=JSON.parse(localStorage.links||"null")||Array.from({length:8},(_,i)=>({name:"Link "+(i+1),url:""}));
pwd.value=localStorage.pwd||"";note.value=localStorage.note||"";
pwd.oninput=()=>localStorage.pwd=pwd.value;
note.oninput=()=>localStorage.note=note.value;
function copyPwd(){navigator.clipboard.writeText(pwd.value);}
function save(){localStorage.mails=JSON.stringify(mails);localStorage.used=JSON.stringify(used);render();}
function render(){
cnt.textContent="Đã dùng: "+used.filter(Boolean).length+"/10";
emails.innerHTML="";
for(let i=0;i<10;i++){
let r=document.createElement("div");r.className="row";
let d=document.createElement("div");d.className="grow";
d.innerHTML="<b>Mail "+(i+1)+"</b><br>"+(mails[i]||"(trống)")+(used[i]?" <span class='used'>✅ Đã dùng</span>":"");
let b=document.createElement("button");b.textContent="📋 Copy";
b.onclick=()=>{if(mails[i])navigator.clipboard.writeText(mails[i]);used[i]=!used[i];save();}
r.append(d,b);emails.append(r);}
links.innerHTML="";
links.forEach((l,i)=>{
let box=document.createElement("div");box.className="linkbox";
let n=document.createElement("input");n.value=l.name;n.placeholder="Tên";
n.onchange=e=>{links[i].name=e.target.value;localStorage.links=JSON.stringify(links);}
let u=document.createElement("input");u.value=l.url;u.placeholder="URL";u.style.marginTop="8px";
u.onchange=e=>{links[i].url=e.target.value;localStorage.links=JSON.stringify(links);}
let b=document.createElement("button");b.style.marginTop="8px";b.textContent="Mở";
b.onclick=()=>{if(links[i].url)window.open(links[i].url,"_blank");}
box.append(n,u,b);links.append(box);
});
}
function updateMail(){let a=bulk.value.trim().split(/\n+/).filter(Boolean).slice(0,10).map(x=>x.split("|")[0].trim());while(a.length<10)a.push("");mails=a;used=Array(10).fill(false);save();}
function resetUsed(){used=Array(10).fill(false);save();}
render();
</script></body></html>
