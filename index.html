<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Android Setup Hub</title>
<style>
body{font-family:Arial;background:#eef2f5;max-width:760px;margin:auto;padding:16px}
.card{background:#fff;border-radius:12px;padding:16px;margin:12px 0}
.row{display:flex;gap:8px;align-items:center;margin:6px 0}
.grow{flex:1}
input,textarea{width:100%;box-sizing:border-box;padding:8px;border:1px solid #ccc;border-radius:6px}
button{background:#1677ff;color:#fff;border:0;border-radius:6px;padding:8px 12px;cursor:pointer}
.used{color:green;font-weight:bold}
.linkbox{border:1px solid #ddd;border-radius:10px;padding:10px;margin:10px 0}
summary{cursor:pointer;font-weight:bold;padding:10px;background:#f9f9f9;border-radius:8px}
.acc-input{width:100px} /* Chiều rộng cố định cho ô pass */
</style>
</head>
<body>

<div class="card">
<h2>Android Setup Hub</h2>
<div id="cnt"></div>
<div id="emails"></div>
</div>

<div class="card">
<details>
<summary>🔗 8 Link nhanh</summary>
<div id="linksContainer"></div>
</details>
</div>

<div class="card">
<details>
<summary>👤 150 Account</summary>
<div id="accContainer" style="margin-top:10px;"></div>
</details>
</div>

<div class="card">
<h3>🔑 Password chung</h3>
<input id="pwd" placeholder="Password chung">
<br><br>
<button id="btn-copy-pwd">📋 Copy Password</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyAXwW5V-Yfs4wVFZpM7Z2uKJQjl_BC5tHw",
    authDomain: "meobzk.firebaseapp.com",
    databaseURL: "https://meobzk-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "meobzk",
    storageBucket: "meobzk.appspot.com",
    messagingSenderId: "226897249765",
    appId: "1:226897249765:web:1800a362b02e6d690a1b0c"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const hubRef = ref(db, 'hub');

let accounts = Array.from({length: 150}, () => ({name: "", pass: ""}));

onValue(hubRef, (snapshot) => {
    const data = snapshot.val() || {};
    if(data.accounts) accounts = data.accounts;
    renderAccounts();
});

function saveAccs() {
    update(hubRef, { accounts });
}

function renderAccounts(){
    const container = document.getElementById("accContainer");
    container.innerHTML = "";
    for(let i=0; i<150; i++){
        let div = document.createElement("div");
        div.className = "row";
        
        let nameInp = document.createElement("input");
        nameInp.placeholder = "Tên " + (i+1);
        nameInp.value = accounts[i].name;
        nameInp.className = "grow";
        nameInp.oninput = (e) => { accounts[i].name = e.target.value; saveAccs(); };

        let btnCopyName = document.createElement("button");
        btnCopyName.textContent = "📋";
        btnCopyName.onclick = () => navigator.clipboard.writeText(accounts[i].name);

        let passInp = document.createElement("input");
        passInp.placeholder = "Pass";
        passInp.value = accounts[i].pass;
        passInp.className = "acc-input";
        passInp.oninput = (e) => { accounts[i].pass = e.target.value; saveAccs(); };

        let btnCopyPass = document.createElement("button");
        btnCopyPass.textContent = "📋";
        btnCopyPass.onclick = () => navigator.clipboard.writeText(accounts[i].pass);

        div.append(nameInp, btnCopyName, passInp, btnCopyPass);
        container.appendChild(div);
    }
}
</script>
</body>
</html>
