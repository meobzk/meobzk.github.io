<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Android Setup Hub</title>
<style>
body{font-family:Arial;background:#eef2f5;max-width:760px;margin:auto;padding:16px}
.card{background:#fff;border-radius:12px;padding:16px;margin:12px 0}
.row{display:flex;gap:6px;align-items:center;margin:6px 0}
.grow{flex:1}
input,textarea{width:100%;box-sizing:border-box;padding:8px;border:1px solid #ccc;border-radius:6px}
button{background:#1677ff;color:#fff;border:0;border-radius:6px;padding:8px 10px;cursor:pointer;white-space:nowrap}
.used{color:green;font-weight:bold}
.linkbox{border:1px solid #ddd;border-radius:10px;padding:10px;margin:10px 0}
summary{cursor:pointer;font-weight:bold;padding:10px;background:#f9f9f9;border-radius:8px}
.acc-input-pass{width:80px} 
.num-label{width:30px;font-size:12px;color:#666}
</style>
</head>
<body>

<div class="card">
<h2>Android Setup Hub</h2>
<div id="cnt"></div>
<div id="emails"></div>
</div>

<div class="card">
<h3>📥 Cập nhật mail</h3>
<textarea id="bulk" rows="6" placeholder="email@abc.us|password"></textarea><br><br>
<button onclick="updateMail()">Cập nhật Mail</button>
<button onclick="resetUsed()">Reset</button>
</div>

<div class="card">
<h3>🔑 Password chung</h3>
<input id="pwd" placeholder="Password chung">
<br><br>
<button onclick="navigator.clipboard.writeText(pwd.value)">📋 Copy Password</button>
</div>

<div class="card">
<details>
<summary>🔗 8 Link nhanh</summary>
<div id="linksContainer"></div>
</details>
</div>

<div class="card">
<details>
<summary>👤 150 Account</summary>
<div id="accContainer" style="margin-top:10px;"></div>
</details>
</div>

<div class="card">
<h3>📝 Ghi chú</h3>
<textarea id="note" rows="5"></textarea>
</div>

<script>
// --- Khởi tạo dữ liệu ---
let mails = JSON.parse(localStorage.getItem("mails") || "[]");
let used = JSON.parse(localStorage.getItem("used") || "[]");
while(mails.length < 10) mails.push("");
while(used.length < 10) used.push(false);

let links = JSON.parse(localStorage.getItem("links") || "null");
if(!links){
 links = Array.from({length: 8}, (_,i) => ({name: "Link "+(i+1), url: ""}));
 localStorage.setItem("links", JSON.stringify(links));
}

let accounts = JSON.parse(localStorage.getItem("accounts") || "null");
if(!accounts){
 accounts = Array.from({length: 150}, () => ({name: "", pass: ""}));
 localStorage.setItem("accounts", JSON.stringify(accounts));
}

// --- Logic giao diện ---
pwd.value = localStorage.getItem("pwd") || "";
note.value = localStorage.getItem("note") || "";
pwd.oninput = () => localStorage.setItem("pwd", pwd.value);
note.oninput = () => localStorage.setItem("note", note.value);

function saveMail(){
 localStorage.setItem("mails", JSON.stringify(mails));
 localStorage.setItem("used", JSON.stringify(used));
 renderEmails();
}

function renderEmails(){
 cnt.textContent = "Đã dùng: " + used.filter(x=>x).length + "/10";
 emails.innerHTML = "";
 for(let i=0; i<10; i++){
   let r = document.createElement("div");
   r.className = "row";
   let d = document.createElement("div");
   d.className = "grow";
   d.innerHTML = "<b>Mail "+(i+1)+"</b><br>"+(mails[i]||"(trống)")+(used[i]?" <span class='used'>✅</span>":"");
   let b = document.createElement("button");
   b.textContent = "📋 Copy";
   b.onclick = () => {
      if(mails[i]) navigator.clipboard.writeText(mails[i]);
      used[i] = !used[i];
      saveMail();
   };
   r.append(d, b);
   emails.appendChild(r);
 }
}

function renderLinks(){
 const c = document.getElementById("linksContainer");
 c.innerHTML = "";
 links.forEach((item, index) => {
   const box = document.createElement("div");
   box.className = "linkbox";
   const name = document.createElement("input");
   name.value = item.name;
   name.oninput = (e) => { links[index].name = e.target.value; localStorage.setItem("links", JSON.stringify(links)); };
   const url = document.createElement("input");
   url.style.marginTop = "8px";
   url.value = item.url;
   url.oninput = (e) => { links[index].url = e.target.value; localStorage.setItem("links", JSON.stringify(links)); };
   const btn = document.createElement("button");
   btn.style.marginTop = "8px";
   btn.textContent = "Mở";
   btn.onclick = () => { if(links[index].url.trim()) window.open(links[index].url, "_blank"); };
   box.append(name, url, btn);
   c.appendChild(box);
 });
}

function renderAccounts(){
 const container = document.getElementById("accContainer");
 container.innerHTML = "";
 for(let i=0; i<150; i++){
    let div = document.createElement("div");
    div.className = "row";
    
    let num = document.createElement("span");
    num.className = "num-label";
    num.textContent = (i+1);

    let nameInp = document.createElement("input");
    nameInp.placeholder = "Tên";
    nameInp.value = accounts[i].name;
    nameInp.className = "grow";
    nameInp.oninput = (e) => { accounts[i].name = e.target.value; localStorage.setItem("accounts", JSON.stringify(accounts)); };

    let btnCopyName = document.createElement("button");
    btnCopyName.textContent = "📋";
    btnCopyName.onclick = () => navigator.clipboard.writeText(accounts[i].name);

    let passInp = document.createElement("input");
    passInp.placeholder = "Pass";
    passInp.value = accounts[i].pass;
    passInp.className = "acc-input-pass";
    passInp.oninput = (e) => { accounts[i].pass = e.target.value; localStorage.setItem("accounts", JSON.stringify(accounts)); };

    let btnCopyPass = document.createElement("button");
    btnCopyPass.textContent = "📋";
    btnCopyPass.onclick = () => navigator.clipboard.writeText(accounts[i].pass);

    div.append(num, nameInp, btnCopyName, passInp, btnCopyPass);
    container.appendChild(div);
 }
}

function updateMail(){
 let arr = bulk.value.trim().split(/\n+/).filter(Boolean).slice(0,10).map(v => v.split("|")[0].trim());
 while(arr.length < 10) arr.push("");
 mails = arr;
 used = Array(10).fill(false);
 saveMail();
}

function resetUsed(){
 used = Array(10).fill(false);
 saveMail();
}

// Chạy lần đầu
renderEmails();
renderLinks();
renderAccounts();
</script>
</body>
</html>
