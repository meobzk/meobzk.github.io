<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Android Setup Hub</title>
<style>
    body{font-family:Arial;background:#eef2f5;max-width:760px;margin:auto;padding:16px}
    .card{background:#fff;border-radius:12px;padding:16px;margin:12px 0}
    .row{display:flex;gap:6px;align-items:center;margin:6px 0}
    .grow{flex:1}
    input,textarea{width:100%;box-sizing:border-box;padding:8px;border:1px solid #ccc;border-radius:6px}
    button{background:#1677ff;color:#fff;border:0;border-radius:6px;padding:8px 10px;cursor:pointer;white-space:nowrap}
    .check-btn{background:#fff;border:1px solid #ccc;width:40px;height:35px;font-size:18px;border-radius:6px}
    .checked{background:#d4edda;border-color:#28a745}
    .linkbox{border:1px solid #ddd;border-radius:10px;padding:10px;margin:10px 0}
    summary{cursor:pointer;font-weight:bold;padding:10px;background:#f9f9f9;border-radius:8px}
    .num-label{width:35px;font-size:12px;color:#666;flex-shrink:0}
</style>
</head>
<body>

<div class="card">
    <h2>Android Setup Hub</h2>
    <div id="cnt"></div>
    <div id="emails"></div>
</div>

<div class="card">
    <h3>📥 Cập nhật mail</h3>
    <textarea id="bulk" rows="4" placeholder="email|password (Tối đa 10 dòng)"></textarea>
    <div style="margin-top:10px">
        <button id="btn-update">Cập nhật Mail</button>
        <button id="btn-reset-mail" style="background:#666">Reset Mail</button>
    </div>
</div>

<div class="card">
    <h3>🔑 Password chung</h3>
    <input id="pwd" placeholder="Password chung">
    <button style="margin-top:10px" id="btn-copy-pwd">📋 Copy Password</button>
</div>

<div class="card">
    <details>
        <summary>🔗 8 Link nhanh</summary>
        <div id="linksContainer"></div>
    </details>
</div>

<div class="card">
    <details>
        <summary>👤 200 Account</summary>
        <div style="display:flex; gap:8px; margin:10px 0;">
            <button id="btn-copy-all-names" style="background:#28a745; flex:1;">📋 Copy tất cả Tên</button>
            <button id="btn-reset-acc" style="background:#ff4d4f; flex:1;">Reset tất cả dấu tích ✅</button>
        </div>
        <div id="accContainer"></div>
    </details>
</div>

<div class="card">
    <h3>📝 Ghi chú</h3>
    <textarea id="note" rows="4"></textarea>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyAXwW5V-Yfs4wVFZpM7Z2uKJQjl_BC5tHw",
    databaseURL: "https://meobzk-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "meobzk"
};
const db = getDatabase(initializeApp(firebaseConfig));
const hubRef = ref(db, 'hub');

let state = { mails:[], used:[], links:[], accounts:[], pwd:"", note:"" };

onValue(hubRef, (snap) => {
    const data = snap.val() || {};
    state.mails = data.mails || Array(10).fill("");
    state.used = data.used || Array(10).fill(false);
    state.links = data.links || Array.from({length: 8}, (_,i) => ({name: "Link "+(i+1), url: ""}));
    
    // Ép buộc khởi tạo đúng đủ 200 phần tử (giữ lại dữ liệu cũ, phần thiếu tự động điền rỗng)
    let loadedAccs = data.accounts || [];
    state.accounts = Array.from({length: 200}, (_, i) => {
        return loadedAccs[i] || { name: "", pass: "", checked: false };
    });
    
    if(document.activeElement.id !== "pwd") pwd.value = data.pwd || "";
    if(document.activeElement.id !== "note") note.value = data.note || "";
    render();
});

function render() {
    const activeId = document.activeElement ? document.activeElement.id : null;
    
    // 1. Render Mail (Toggle)
    emails.innerHTML = ""; cnt.textContent = "Đã dùng: " + state.used.filter(x=>x).length + "/10";
    state.mails.forEach((m,i) => {
        let r = document.createElement("div"); r.className = "row";
        r.innerHTML = `<div class="grow"><b>Mail ${i+1}</b> ${state.used[i] ? "✅" : ""}<br>${m||"(trống)"}</div>`;
        let b = document.createElement("button"); b.textContent = "Copy";
        b.onclick = () => { 
            if(m) navigator.clipboard.writeText(m); 
            state.used[i] = !state.used[i]; 
            update(hubRef, {used: state.used}); 
        };
        r.appendChild(b); emails.appendChild(r);
    });

    // 2. Render Links
    linksContainer.innerHTML = "";
    state.links.forEach((l,i) => {
        let box = document.createElement("div"); box.className = "linkbox";
        let n = document.createElement("input"); n.value = l.name; n.id = "ln"+i; n.oninput = (e)=>{state.links[i].name=e.target.value; update(hubRef, {links:state.links});};
        let u = document.createElement("input"); u.value = l.url; u.id = "lu"+i; u.style.marginTop="5px"; u.oninput = (e)=>{state.links[i].url=e.target.value; update(hubRef, {links:state.links});};
        let b = document.createElement("button"); b.textContent="Mở"; b.style.marginTop="8px"; b.onclick=()=>{if(l.url) window.open(l.url,"_blank")};
        box.append(n, u, b); linksContainer.appendChild(box);
    });

    // 3. Render 200 Accounts
    accContainer.innerHTML = "";
    state.accounts.forEach((acc, i) => {
        let div = document.createElement("div"); div.className = "row";
        let n = document.createElement("input"); n.value = acc.name; n.className = "grow"; n.placeholder = "Tên"; n.id = "n"+i; 
        n.oninput = (e)=>{ state.accounts[i].name = e.target.value; update(hubRef, {accounts:state.accounts}); };
        let c1 = document.createElement("button"); c1.textContent="📋"; c1.onclick=()=>navigator.clipboard.writeText(acc.name);
        let p = document.createElement("input"); p.value = acc.pass; p.style.width="70px"; p.placeholder = "Pass"; p.id = "p"+i;
        p.oninput = (e)=>{ state.accounts[i].pass = e.target.value; update(hubRef, {accounts:state.accounts}); };
        let c2 = document.createElement("button"); c2.textContent="📋"; c2.onclick=()=>navigator.clipboard.writeText(acc.pass);
        let c = document.createElement("button"); c.className = "check-btn " + (acc.checked ? "checked" : "");
        c.innerHTML = acc.checked ? "✅" : "";
        c.onclick = () => { state.accounts[i].checked = !state.accounts[i].checked; update(hubRef, {accounts: state.accounts}); };
        div.innerHTML = `<span class="num-label">${i+1}</span>`;
        div.append(n, c1, p, c2, c);
        accContainer.appendChild(div);
    });
    if(activeId && document.getElementById(activeId)) document.getElementById(activeId).focus();
}

document.getElementById("btn-update").onclick = () => { state.mails = bulk.value.split("\n").filter(Boolean).slice(0,10); update(hubRef, {mails: state.mails, used: Array(10).fill(false)}); bulk.value=""; };
document.getElementById("btn-reset-mail").onclick = () => update(hubRef, {used: Array(10).fill(false)});

document.getElementById("btn-copy-all-names").onclick = () => {
    let allNames = state.accounts.map(acc => acc.name || "").join("\n");
    navigator.clipboard.writeText(allNames).then(() => {
        alert("Đã copy toàn bộ tên của 200 account vào bộ nhớ tạm!");
    });
};

document.getElementById("btn-reset-acc").onclick = () => {
    let newAccs = state.accounts.map(a => ({...a, checked: false}));
    update(hubRef, {accounts: newAccs});
};
document.getElementById("btn-copy-pwd").onclick = () => navigator.clipboard.writeText(pwd.value);
pwd.oninput = () => update(hubRef, {pwd: pwd.value});
note.oninput = () => update(hubRef, {note: note.value});
</script>
</body>
</html>
