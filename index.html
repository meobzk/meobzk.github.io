<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Android Setup Hub</title>
<style>
body{font-family:Arial;background:#eef2f5;max-width:760px;margin:auto;padding:16px}
.card{background:#fff;border-radius:12px;padding:16px;margin:12px 0}
.row{display:flex;gap:6px;align-items:center;margin:6px 0}
.grow{flex:1}
input{padding:8px;border:1px solid #ccc;border-radius:6px}
button{background:#1677ff;color:#fff;border:0;border-radius:6px;padding:8px 10px;cursor:pointer}
.check-btn{width:40px;background:#eee;color:#333}
.checked{background:#28a745;color:#fff}
.linkbox{border:1px solid #ddd;border-radius:10px;padding:10px;margin:10px 0}
summary{cursor:pointer;font-weight:bold;padding:10px;background:#f9f9f9;border-radius:8px}
</style>
</head>
<body>

<div class="card">
<h2>Android Setup Hub</h2>
<div id="cnt"></div>
<div id="emails"></div>
</div>

<div class="card">
<h3>👤 150 Account</h3>
<button id="btn-reset-acc" style="background:#ff4d4f;width:100%;margin-bottom:10px;">Reset tất cả dấu tích ✅</button>
<div id="accContainer"></div>
</div>

<div class="card">
<details>
<summary>🔗 8 Link nhanh</summary>
<div id="linksContainer"></div>
</details>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyAXwW5V-Yfs4wVFZpM7Z2uKJQjl_BC5tHw",
    databaseURL: "https://meobzk-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "meobzk"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const hubRef = ref(db, 'hub');

let accounts = [];

// Lắng nghe dữ liệu từ Firebase
onValue(hubRef, (snapshot) => {
    const data = snapshot.val() || {};
    accounts = data.accounts || Array.from({length: 150}, () => ({name: "", pass: "", checked: false}));
    renderAccounts();
});

function saveData(obj) { update(hubRef, obj); }

function renderAccounts(){
    const container = document.getElementById("accContainer");
    container.innerHTML = "";
    accounts.forEach((acc, i) => {
        let div = document.createElement("div"); div.className = "row";
        
        let label = document.createElement("span"); label.textContent = (i+1); label.style.width="25px";
        
        let nameInp = document.createElement("input"); nameInp.className = "grow"; nameInp.value = acc.name;
        nameInp.oninput = (e) => { accounts[i].name = e.target.value; saveData({accounts}); };
        
        let passInp = document.createElement("input"); passInp.style.width="70px"; passInp.value = acc.pass;
        passInp.oninput = (e) => { accounts[i].pass = e.target.value; saveData({accounts}); };
        
        let cBtn = document.createElement("button"); 
        cBtn.className = "check-btn " + (acc.checked ? "checked" : "");
        cBtn.textContent = "✅";
        cBtn.onclick = () => { accounts[i].checked = !accounts[i].checked; saveData({accounts}); };
        
        div.append(label, nameInp, passInp, cBtn);
        container.appendChild(div);
    });
}

document.getElementById("btn-reset-acc").onclick = () => {
    accounts.forEach(a => a.checked = false);
    saveData({accounts});
};
</script>
</body>
</html>
