<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase x GitHub Pages</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background-color: #f4f7f6; }
        .container { max-width: 500px; margin: auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        input, button { padding: 10px; font-size: 16px; margin: 10px 0; width: 80%; border-radius: 4px; border: 1px solid #ccc; }
        button { background-color: #0288d1; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #01579b; }
        #data-display { font-weight: bold; color: #ff9900; font-size: 22px; margin-top: 20px; min-height: 30px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Kết nối Realtime Database</h2>

        <input type="text" id="input-data" placeholder="Nhập dữ liệu mới...">
        <button id="btn-send">Gửi lên Firebase</button>

        <hr>
        <p>Dữ liệu hiện tại trên Database:</p>
        <div id="data-display">Đang tải dữ liệu...</div>
    </div>

    <!-- Nhúng Firebase SDK sử dụng ES Modules từ CDN -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Cấu hình Firebase của dự án meobzk
        const firebaseConfig = {
            apiKey: "AIzaSyAXwW5V-Yfs4wVFZpM7Z2uKJQjl_BC5tHw",
            authDomain: "meobzk.firebaseapp.com",
            databaseURL: "https://meobzk-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "meobzk",
            storageBucket: "meobzk.appspot.com",
            messagingSenderId: "226897249765",
            appId: "1:226897249765:web:1800a362b02e6d690a1b0c"
        };

        // Khởi tạo Firebase ứng dụng Web
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Tạo tham chiếu đến một thư mục tên là 'message' trên Database
        const dbRef = ref(db, 'message');

        // 1. Lắng nghe thay đổi dữ liệu thời gian thực (Read)
        onValue(dbRef, (snapshot) => {
            const data = snapshot.val();
            document.getElementById('data-display').innerText = data ? data : "Chưa có dữ liệu";
        });

        // 2. Gửi dữ liệu mới lên khi người dùng nhấn nút (Write)
        document.getElementById('btn-send').addEventListener('click', () => {
            const inputValue = document.getElementById('input-data').value;
            if (inputValue.trim() !== "") {
                set(dbRef, inputValue)
                    .then(() => {
                        alert("Cập nhật dữ liệu thành công!");
                        document.getElementById('input-data').value = "";
                    })
                    .catch((error) => {
                        console.error("Lỗi khi ghi dữ liệu: ", error);
                        alert("Gặp lỗi, vui lòng kiểm tra Security Rules!");
                    });
            }
        });
    </script>
</body>
</html>
