<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Android Setup Hub</title>
<style>
body{font-family:Arial;background:#eef2f5;max-width:760px;margin:auto;padding:16px}
.card{background:#fff;border-radius:12px;padding:16px;margin:12px 0}
.row{display:flex;gap:6px;align-items:center;margin:6px 0}
.grow{flex:1}
input,textarea{width:100%;box-sizing:border-box;padding:8px;border:1px solid #ccc;border-radius:6px}
button{background:#1677ff;color:#fff;border:0;border-radius:6px;padding:8px 10px;cursor:pointer;white-space:nowrap}
.used{color:green;font-weight:bold}
.linkbox{border:1px solid #ddd;border-radius:10px;padding:10px;margin:10px 0}
summary{cursor:pointer;font-weight:bold;padding:10px;background:#f9f9f9;border-radius:8px}
.acc-input-pass{width:80px} 
.num-label{width:30px;font-size:12px;color:#666;flex-shrink:0}
</style>
</head>
<body>

<div class="card">
<h2>Android Setup Hub</h2>
<div id="cnt"></div>
<div id="emails"></div>
</div>

<div class="card">
<h3>📥 Cập nhật mail</h3>
<textarea id="bulk" rows="6" placeholder="email@abc.us|password"></textarea><br><br>
<button id="btn-update">Cập nhật Mail</button>
<button id="btn-reset">Reset</button>
</div>

<div class="card">
<h3>🔑 Password chung</h3>
<input id="pwd" placeholder="Password chung">
<br><br>
<button id="btn-copy-pwd">📋 Copy Password</button>
</div>

<div class="card">
<details>
<summary>🔗 8 Link nhanh</summary>
<div id="linksContainer"></div>
</details>
</div>

<div class="card">
<details>
<summary>👤 150 Account</summary>
<div id="accContainer" style="margin-top:10px;"></div>
</details>
</div>

<div class="card">
<h3>📝 Ghi chú</h3>
<textarea id="note" rows="5"></textarea>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyAXwW5V-Yfs4wVFZpM7Z2uKJQjl_BC5tHw",
    authDomain: "meobzk.firebaseapp.com",
    databaseURL: "https://meobzk-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "meobzk",
    storageBucket: "meobzk.appspot.com",
    messagingSenderId: "226897249765",
    appId: "1:226897249765:web:1800a362b02e6d690a1b0c"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const hubRef = ref(db, 'hub');

let mails = [], used = [], links = [], accounts = [];

onValue(hubRef, (snapshot) => {
    const data = snapshot.val() || {};
    mails = data.mails || Array(10).fill("");
    used = data.used || Array(10).fill(false);
    links = data.links || Array.from({length: 8}, (_,i) => ({name: "Link "+(i+1), url: ""}));
    accounts = data.accounts || Array.from({length: 150}, () => ({name: "", pass: ""}));
    
    if (document.activeElement !== pwd) pwd.value = data.pwd || "";
    if (document.activeElement !== note) note.value = data.note || "";
    
    renderAll();
});

function saveData(obj) { update(hubRef, obj); }

function renderAll() {
    renderEmails();
    renderLinks();
    renderAccounts();
}

function renderEmails(){
    cnt.textContent = "Đã dùng: " + used.filter(x=>x).length + "/10";
    emails.innerHTML = "";
    mails.forEach((m, i) => {
        let r = document.createElement("div");
        r.className = "row";
        r.innerHTML = `<div class='grow'><b>Mail ${i+1}</b><br>${m||"(trống)"}${used[i]?" <span class='used'>✅</span>":""}</div>`;
        let b = document.createElement("button");
        b.textContent = "Copy";
        b.onclick = () => { if(m) navigator.clipboard.writeText(m); used[i] = !used[i]; saveData({used}); };
        r.appendChild(b);
        emails.appendChild(r);
    });
}

function renderLinks(){
    const c = document.getElementById("linksContainer");
    c.innerHTML = "";
    links.forEach((item, i) => {
        const box = document.createElement("div");
        box.className = "linkbox";
        const name = document.createElement("input"); name.value = item.name;
        name.oninput = (e) => { links[i].name = e.target.value; saveData({links}); };
        const url = document.createElement("input"); url.style.marginTop="8px"; url.value = item.url;
        url.oninput = (e) => { links[i].url = e.target.value; saveData({links}); };
        box.append(name, url);
        c.appendChild(box);
    });
}

function renderAccounts(){
    const container = document.getElementById("accContainer");
    container.innerHTML = "";
    for(let i=0; i<150; i++){
        let div = document.createElement("div");
        div.className = "row";
        
        let num = document.createElement("span"); num.className = "num-label"; num.textContent = (i+1);
        let nameInp = document.createElement("input"); nameInp.placeholder = "Tên"; nameInp.className = "grow"; nameInp.value = accounts[i].name;
        nameInp.oninput = (e) => { accounts[i].name = e.target.value; saveData({accounts}); };
        let btn1 = document.createElement("button"); btn1.textContent = "📋"; btn1.onclick = () => navigator.clipboard.writeText(accounts[i].name);
        
        let passInp = document.createElement("input"); passInp.placeholder = "Pass"; passInp.className = "acc-input-pass"; passInp.value = accounts[i].pass;
        passInp.oninput = (e) => { accounts[i].pass = e.target.value; saveData({accounts}); };
        let btn2 = document.createElement("button"); btn2.textContent = "📋"; btn2.onclick = () => navigator.clipboard.writeText(accounts[i].pass);

        div.append(num, nameInp, btn1, passInp, btn2);
        container.appendChild(div);
    }
}

// Event Listeners
document.getElementById("btn-update").onclick = () => {
    let arr = bulk.value.trim().split(/\n+/).map(v => v.split("|")[0].trim());
    mails = [...arr, ...Array(10).fill("")].slice(0, 10);
    used = Array(10).fill(false);
    saveData({mails, used});
    bulk.value = "";
};
document.getElementById("btn-reset").onclick = () => saveData({used: Array(10).fill(false)});
document.getElementById("btn-copy-pwd").onclick = () => navigator.clipboard.writeText(pwd.value);
pwd.oninput = () => saveData({pwd: pwd.value});
note.oninput = () => saveData({note: note.value});
</script>
</body>
</html>
