
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Android Setup Hub</title>
<style>
body{font-family:Arial,sans-serif;background:#f2f2f2;margin:0;padding:16px}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:16px}
textarea,input{width:100%;box-sizing:border-box;padding:10px;margin:6px 0}
.row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #eee}
button{padding:10px 14px;border:0;border-radius:8px;background:#0d6efd;color:#fff;font-weight:bold}
.used{color:green;font-weight:bold}
.small{font-size:13px;color:#666}
</style>
</head>
<body>
<div class="card">
<h2>Android Setup Hub</h2>
<div id="count">Đã dùng: 0/10</div>
<div id="list"></div>
</div>

<div class="card">
<h3>Password</h3>
<input id="pwd">
<button onclick="copyPwd()">Copy Password</button>
</div>

<div class="card">
<h3>Cập nhật mail</h3>
<div class="small">Mỗi dòng: email@abc.us|password</div>
<textarea id="bulk" rows="8"></textarea>
<button onclick="updateMail()">Cập nhật Mail</button>
<button onclick="resetUsed()">Reset trạng thái</button>
</div>

<div class="card">
<h3>8 Link nhanh</h3>
<div id="links"></div>
</div>

<div class="card">
<h3>Ghi chú</h3>
<textarea id="note" rows="6"></textarea>
</div>

<script>
let mails=JSON.parse(localStorage.mails||"[]");
let used=JSON.parse(localStorage.used||"[]");
let pwd=localStorage.pwd||"";
let links=JSON.parse(localStorage.links||"null")||Array.from({length:8},(_,i)=>({name:"Link "+(i+1),url:""}));
note.value=localStorage.note||"";
pwd.value=pwd;

function save(){
 localStorage.mails=JSON.stringify(mails);
 localStorage.used=JSON.stringify(used);
 localStorage.pwd=JSON.stringify(document.getElementById('pwd').value).slice(1,-1);
 localStorage.note=note.value;
 localStorage.links=JSON.stringify(links);
 render();
}
document.getElementById("pwd").oninput=save;
note.oninput=save;

function render(){
 let c=used.filter(Boolean).length;
 count.textContent="Đã dùng: "+c+"/10";
 list.innerHTML="";
 for(let i=0;i<10;i++){
 let d=document.createElement("div");
 d.className="row";
 d.innerHTML="<div><b>Mail "+(i+1)+"</b><br>"+(mails[i]||"(trống)")+" "+(used[i]?'<span class=used>✅ Đã dùng</span>':'')+"</div>";
 let b=document.createElement("button");
 b.textContent="Copy";
 b.onclick=()=>{
   if(mails[i]) navigator.clipboard.writeText(mails[i]);
   used[i]=!used[i];
   save();
 };
 d.appendChild(b); list.appendChild(d);
 }
 linksDiv();
}
function linksDiv(){
 links.innerHTML="";
 links.forEach((l,i)=>{
 let r=document.createElement("div");r.className="row";
 r.innerHTML='<div style="flex:1"><input placeholder="Tên" value="'+l.name+'" onchange="links['+i+'].name=this.value;save()"><input placeholder="URL" value="'+l.url+'" onchange="links['+i+'].url=this.value;save()"></div>';
 let b=document.createElement("button");b.textContent="Mở";b.onclick=()=>{if(l.url)window.open(l.url)};
 r.appendChild(b);links.appendChild(r);
 });
}
function updateMail(){
 let arr=bulk.value.trim().split(/\n+/).filter(Boolean).slice(0,10).map(x=>x.split("|")[0].trim());
 mails=arr; while(mails.length<10)mails.push("");
 used=Array(10).fill(false);
 save();
}
function resetUsed(){used=Array(10).fill(false);save();}
function copyPwd(){navigator.clipboard.writeText(document.getElementById("pwd").value);}
render();
</script>
</body></html>
