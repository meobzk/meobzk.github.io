<!DOCTYPE html>
<html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Android Setup Hub</title>
<style>
body{font-family:Arial;margin:16px;background:#f3f3f3}
.card{background:#fff;padding:12px;border-radius:10px;margin-bottom:12px}
button,a{padding:8px 12px;border-radius:6px;border:none;background:#1976d2;color:#fff;text-decoration:none;cursor:pointer}
.row{display:flex;gap:8px;align-items:center;margin:6px 0}
input,textarea{width:100%;padding:8px}
.used{background:#d9ffd9}
small{color:#555}
</style></head><body>
<h2>Android Setup Hub</h2>
<div class="card">
<b id="count">Đã dùng: 0/10</b>
<div id="list"></div>
</div>
<div class="card">
<h3>Password</h3>
<input id="pass">
<button onclick="copyPass()">📋 Copy Password</button>
</div>
<div class="card">
<h3>8 Link nhanh</h3>
<div id="links"></div>
</div>
<div class="card">
<h3>Ghi chú</h3>
<textarea id="note" rows="5"></textarea><br><button onclick="save()">💾 Lưu</button>
</div>
<div class="card">
<h3>Cài đặt</h3>
<small>Dán 10 mail (mỗi dòng 1 mail)</small>
<textarea id="mails" rows="10"></textarea>
<button onclick="updateMails()">Cập nhật Mail</button>
<button onclick="resetUsed()">Reset trạng thái</button>
</div>
<script>
let data=JSON.parse(localStorage.getItem("setupHub")||'{}');
if(!data.mails)data={mails:Array(10).fill(""),used:Array(10).fill(false),pass:"",note:"",links:Array.from({length:8},(_,i)=>({name:"Link "+(i+1),url:"#"}))};
function render(){
document.getElementById("pass").value=data.pass;
document.getElementById("note").value=data.note;
document.getElementById("mails").value=data.mails.join("\n");
let c=0,s="";
data.mails.forEach((m,i)=>{if(data.used[i])c++;
s+=`<div class='row ${data.used[i]?"used":""}'><div style="flex:1"><b>Mail ${i+1}</b><br>${m||"(trống)"}</div><button onclick="copyMail(${i})">${data.used[i]?"✅ Đã dùng":"📋 Copy"}</button></div>`});
document.getElementById("list").innerHTML=s;
document.getElementById("count").innerText=`Đã dùng: ${c}/10`;
let l="";
data.links.forEach((x,i)=>{l+=`<div class=row><input value="${x.name}" onchange="data.links[${i}].name=this.value;save()" style="max-width:120px"><input value="${x.url}" onchange="data.links[${i}].url=this.value;save()"><a target=_blank href="${x.url}">Mở</a></div>`});
document.getElementById("links").innerHTML=l;
}
function save(){data.pass=pass.value;data.note=note.value;localStorage.setItem("setupHub",JSON.stringify(data));render();}
function updateMails(){data.mails=mails.value.split(/\n/).map(line=>{line=line.trim();const match=line.match(/^.*?\.us/i);return match?match[0]:"";}).filter(line=>line!=="").slice(0,10);while(data.mails.length<10)data.mails.push("");data.used=Array(10).fill(false);save();}
function resetUsed(){data.used=Array(10).fill(false);save();}
async function copyMail(i){await navigator.clipboard.writeText(data.mails[i]||"");data.used[i]=true;save();}
async function copyPass(){await navigator.clipboard.writeText(data.pass||"");}
render();
</script></body></html>
